name: Build & Deploy

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'tests/**'
      - 'test*.py'
      - 'benchmark*.py'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/parody-critics

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,suffix=,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to DUNE
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy via SSH to DUNE
        uses: appleboy/ssh-action@v1
        env:
          GHCR_PAT: ${{ secrets.GHCR_PULL_TOKEN }}
        with:
          host: ${{ secrets.DUNE_TAILSCALE_IP }}
          username: stilgar
          key: ${{ secrets.DUNE_SSH_KEY }}
          envs: GHCR_PAT
          script: |
            set -e
            echo "→ Logging in to GHCR..."
            echo "$GHCR_PAT" | docker login ghcr.io -u Niskeletor --password-stdin

            echo "→ Pulling latest image..."
            docker compose -p parody-critics -f /home/stilgar/docker/parody-critics/docker-compose.yml pull

            echo "→ Recreating container..."
            docker compose -p parody-critics -f /home/stilgar/docker/parody-critics/docker-compose.yml up -d --force-recreate

            echo "→ Waiting for health check..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8003/api/health > /dev/null 2>&1; then
                echo "✅ Deploy exitoso - Health check passed (attempt $i)"
                break
              fi
              if [ $i -eq 12 ]; then
                echo "❌ Health check failed after 60s"
                docker logs parody-critics-api --tail 30
                exit 1
              fi
              sleep 5
            done

            echo "→ Cleaning up old images..."
            docker image prune -f --filter "until=168h" || true
