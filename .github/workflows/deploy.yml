name: Build & Deploy

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'benchmark*.py'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/parody-critics

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest anyio[asyncio]

      - name: Run tests
        env:
          LLM_OLLAMA_URL: 'http://localhost:11434'
          PARODY_CRITICS_ENV: 'development'
        run: PYTHONPATH=. python -m pytest tests/test_security_fixes.py -v --tb=short

  build:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,suffix=,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to DUNE
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy via SSH to DUNE
        uses: appleboy/ssh-action@v1
        env:
          GHCR_PAT: ${{ secrets.GHCR_PULL_TOKEN }}
        with:
          host: ${{ secrets.DUNE_TAILSCALE_IP }}
          username: stilgar
          key: ${{ secrets.DUNE_SSH_KEY }}
          envs: GHCR_PAT
          script: |
            set -e
            echo "→ Logging in to GHCR..."
            echo "$GHCR_PAT" | docker login ghcr.io -u Niskeletor --password-stdin

            echo "→ Pulling latest image..."
            docker pull ghcr.io/niskeletor/parody-critics:latest

            echo "→ Fixing DB permissions..."
            docker run --rm -v parody_critics_data:/data alpine chown 1000:1000 /data/critics.db 2>/dev/null || true

            echo "→ Recreating production (:8003)..."
            docker compose -p parody-critics -f /home/stilgar/docker/parody-critics/docker-compose.yml up -d --force-recreate

            echo "→ Recreating test (:8004)..."
            docker compose -p parody-critics-test -f /home/stilgar/docker/parody-critics-test/docker-compose.yml up -d --force-recreate

            echo "→ Waiting for health checks..."
            for i in $(seq 1 12); do
              PROD_OK=false
              TEST_OK=false
              curl -sf http://localhost:8003/api/health > /dev/null 2>&1 && PROD_OK=true
              curl -sf http://localhost:8004/api/health > /dev/null 2>&1 && TEST_OK=true
              if $PROD_OK && $TEST_OK; then
                echo "✅ Deploy exitoso — :8003 y :8004 healthy (attempt $i)"
                break
              fi
              if [ $i -eq 12 ]; then
                echo "❌ Health check failed after 60s — prod:$PROD_OK test:$TEST_OK"
                docker logs parody-critics-api --tail 20
                docker logs parody-critics-test --tail 20
                exit 1
              fi
              sleep 5
            done

            echo "→ Cleaning up old images..."
            docker image prune -f --filter "until=168h" || true
